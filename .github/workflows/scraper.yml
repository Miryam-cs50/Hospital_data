name: Hospital Data Scraper

# 設定觸發條件
on:
  schedule:
    # 這是 Cron 語法，代表「每 5 分鐘執行一次」
    - cron: '*/5 * * * *'
  workflow_dispatch: # 允許您手動點擊按鈕測試運行

jobs:
  build:
    runs-on: ubuntu-latest # 使用最新的 Linux 雲端環境

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3 # 把您的程式碼下載到雲端機器裡

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 指定 Python 版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: python hospital_scraper.py # 執行您的爬蟲程式

      - name: Commit and push changes
        run: |
          # 設定機器人的名字
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"
          
          # 把新產生的 CSV 檔加進來
          git add hospital_waiting_data.csv
          
          # 提交並推播回您的 GitHub 倉庫 (如果沒有新資料就不會報錯)
          git commit -m "Auto-update hospital data" || exit 0
          git push
